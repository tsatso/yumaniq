<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Every Move You Make - Blizbeat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
    background: #0a0908;
    color: #b8b0a4;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d4a84322; border-radius: 2px; }

  /* Entry */
  #entry {
    position: fixed; inset: 0; z-index: 100; background: #0a0908;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 2rem; cursor: pointer;
    transition: opacity 1s ease, visibility 1s ease;
  }
  #entry.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
  #entry h1 {
    font-size: clamp(1.8rem, 5.5vw, 3rem); font-weight: 300; font-style: italic;
    color: #e8d5b0; text-align: center; line-height: 1.2; letter-spacing: -0.01em;
  }
  #entry .hint {
    font-size: 0.85rem; color: #5a5347; margin-top: 2rem; font-weight: 300;
  }
  #entry .play-btn {
    width: 46px; height: 46px; border: 1px solid #d4a84333; border-radius: 50%;
    margin-top: 2.5rem; display: flex; align-items: center; justify-content: center;
    animation: pulse 2.5s ease-in-out infinite;
  }
  #entry .play-btn::after {
    content: ''; width: 0; height: 0;
    border-left: 10px solid #d4a843; border-top: 6px solid transparent; border-bottom: 6px solid transparent;
    margin-left: 3px;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.08); opacity: 0.8; } }

  /* Overlays */
  .grad-top { position: fixed; top: 0; left: 0; right: 0; height: 100px; background: linear-gradient(to bottom, #0a0908, transparent); pointer-events: none; z-index: 10; }
  .grad-bot { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: linear-gradient(to top, #0a0908, transparent); pointer-events: none; z-index: 10; }

  /* Audio bars */
  .audio-ind { position: fixed; top: 18px; right: 22px; z-index: 20; display: flex; align-items: flex-end; gap: 3px; opacity: 0; transition: opacity 0.5s; }
  .audio-ind.on { opacity: 0.35; }
  .audio-ind .b { width: 2px; background: #d4a843; border-radius: 1px; }
  .audio-ind .b:nth-child(1) { animation: b1 1.1s ease-in-out infinite; }
  .audio-ind .b:nth-child(2) { animation: b2 1.2s ease-in-out infinite; }
  .audio-ind .b:nth-child(3) { animation: b3 1.3s ease-in-out infinite; }
  @keyframes b1 { 0%,100% { height: 7px; } 50% { height: 14px; } }
  @keyframes b2 { 0%,100% { height: 11px; } 50% { height: 5px; } }
  @keyframes b3 { 0%,100% { height: 14px; } 50% { height: 9px; } }

  /* Story */
  #story { max-width: 600px; margin: 0 auto; padding: 0 clamp(1.5rem, 6vw, 3rem); opacity: 0; transition: opacity 1.2s ease 0.4s; }
  #story.visible { opacity: 1; }

  .sec { opacity: 0; transform: translateY(28px); transition: opacity 0.9s ease, transform 0.9s ease; }
  .sec.vis { opacity: 1; transform: translateY(0); }

  /* Types */
  .t-title { padding: 20vh 0 1.5vh; text-align: center; }
  .t-title h1 { font-size: clamp(2.2rem, 6.5vw, 4rem); font-weight: 300; font-style: italic; color: #e8d5b0; letter-spacing: -0.01em; line-height: 1.1; }

  .t-sub { text-align: center; padding-bottom: 28vh; }
  .t-sub p { font-size: 0.95rem; color: #6a6055; font-weight: 300; margin-top: 1rem; letter-spacing: 0.03em; }

  .t-act { padding: 14vh 0 6vh; text-align: center; }
  .t-act span { font-size: 0.7rem; font-weight: 600; color: #d4a843; letter-spacing: 0.3em; padding-bottom: 0.4rem; border-bottom: 1px solid #d4a84340; }

  .t-p { padding: 0.7rem 0; }
  .t-p p { font-size: clamp(1rem, 2.6vw, 1.12rem); color: #b8b0a4; line-height: 1.8; font-weight: 300; }

  .t-em { padding: 1.8rem 0; }
  .t-em p { font-size: clamp(1.05rem, 2.8vw, 1.2rem); color: #ddd2c0; line-height: 1.75; font-weight: 400; font-style: italic; border-left: 2px solid #d4a84350; padding-left: 1.3rem; }

  .t-rev { padding: 6vh 0; text-align: center; }
  .t-rev p { font-size: clamp(2rem, 5.5vw, 3rem); color: #d4a843; font-style: italic; font-weight: 300; text-shadow: 0 0 60px #d4a84330; }

  .t-div { padding: 4vh 0; text-align: center; }
  .t-div span { color: #d4a84333; font-size: 1rem; letter-spacing: 1.2rem; }

  .t-cl { padding: 0.5rem 0; text-align: center; margin: 0 auto; max-width: 500px; }
  .t-cl p { font-size: clamp(0.95rem, 2.5vw, 1.08rem); color: #8a8278; line-height: 1.8; font-weight: 300; font-style: italic; }

  .t-brk { height: 5vh; }

  .t-fin { padding: 0.4rem 0; text-align: center; }
  .t-fin p { font-size: clamp(1.1rem, 3vw, 1.35rem); color: #e8d5b0; line-height: 1.7; font-weight: 300; font-style: italic; }

  .t-brand { padding: 12vh 0 8vh; text-align: center; }
  .t-brand .nm { font-size: 1.6rem; font-weight: 700; color: #1B2A4A; letter-spacing: 0.06em; }
  .t-brand .co { font-size: 0.65rem; color: #4a4540; letter-spacing: 0.15em; margin-top: 0.4rem; font-weight: 500; }
</style>
</head>
<body>

<div id="entry" onclick="go()">
  <h1>Every Move You Make</h1>
  <p class="hint">tap to begin &middot; headphones on</p>
  <div class="play-btn"></div>
</div>

<div class="grad-top"></div>
<div class="grad-bot"></div>
<div class="audio-ind" id="ai"><div class="b"></div><div class="b"></div><div class="b"></div></div>

<div id="story"></div>

<script>
const S = [
  { t:"title", h:"<h1>Every Move You Make</h1>", z:"silence" },
  { t:"sub", h:"<p>A story about the music trapped inside your body</p>" },

  { t:"act", h:"<span>THE GAP</span>", z:"gap" },
  { t:"p", h:"<p>David drives home from rehearsal replaying the same moment. The bridge in the second song. He heard the bass line in his head. A warm, syncopated phrase that would have locked perfectly with the drummer.</p>" },
  { t:"em", h:"<p>His fingers played something else.</p>" },
  { t:"p", h:"<p>When David hears music, his whole body responds. His head bobs right. His shoulders land on the pocket. His foot finds beat one before the drummer does. His body is a musician.</p>" },
  { t:"em", h:"<p>His fingers are not.</p>" },

  { t:"div", h:"<span>\u2022\u2003\u2003\u2022\u2003\u2003\u2022</span>" },

  { t:"p", h:"<p>Debby sings in a band. Dances since she was four. Six months ago the bass player left and she volunteered to fill in. She had been studying bass for exactly this moment.</p>" },
  { t:"p", h:"<p>By the fourth rehearsal, the guitarist started giving her a look. Not mean. Worse. Patient. The kind of patience people offer when they have stopped expecting you to get it right.</p>" },
  { t:"em", h:"<p>She would rather not play at all than keep hearing herself fail to be herself.</p>" },

  { t:"act", h:"<span>THE UNGUARDED MOMENT</span>", z:"unguarded" },
  { t:"p", h:"<p>Tuesday night. David is alone. He puts on a track and his body starts moving before he decides to move. In the kitchen, in socks, nobody watching. His hips find the groove. His shoulders phrase the melody.</p>" },
  { t:"em", h:"<p>Fluid. Confident. His.</p>" },
  { t:"p", h:"<p>None of it reaches his instrument.</p>" },

  { t:"div", h:"<span>\u2022\u2003\u2003\u2022\u2003\u2003\u2022</span>" },

  { t:"p", h:"<p>Debby is in her car, singing a bass line. Not humming a melody. Singing the bass. Her voice can do what her fingers refuse to do.</p>" },
  { t:"em", h:"<p>She arrives home and the bass line dies with the ignition.</p>" },

  { t:"act", h:"<span>THE SOUND INSIDE</span>", z:"recognition" },
  { t:"p", h:"<p>David is standing in his living room. He closes his eyes and moves. Fifteen seconds in, he hears bass.</p>" },
  { t:"p", h:"<p>Not from his hands. From the speakers. It sits behind the beat the way he sits behind the beat. It breathes where he breathes. It phrases the way his shoulders phrase.</p>" },
  { t:"rev", h:"<p>That is me.</p>" },
  { t:"p", h:"<p>The musician who has lived in his body for 45 years, the one who never had a way out through his fingers, playing bass for the first time.</p>" },

  { t:"div", h:"<span>\u2022\u2003\u2003\u2022\u2003\u2003\u2022</span>" },

  { t:"p", h:"<p>Debby sings and moves. The playback is a bass guitar performing her line. Her notes. Her rhythm. But more than what she sang. Her voice gave it the melody. Her body gave it the soul.</p>" },
  { t:"p", h:"<p>She plays it back three times. The third time, she is already moving again, her body responding to her own bass line, and she is laughing because it is so obviously her that it is almost embarrassing.</p>" },
  { t:"p", h:"<p>She picks up her bass. Her fingers still stumble. But for the first time, she knows exactly what she is reaching for.</p>" },
  { t:"em", h:"<p>The gap is no longer a wall. It is a distance. And distances can be closed.</p>" },

  { t:"act", h:"<span></span>", z:"silence" },
  { t:"cl", h:"<p>Everyone who has ever felt music in their body and failed to get it through their fingers knows this gap.</p>" },
  { t:"brk", h:"" },
  { t:"fin", h:"<p>The music was never missing.</p>" },
  { t:"fin", h:"<p>It just needed a way out.</p>" },
  { t:"brand", h:'<div class="nm">blizbeat</div><div class="co">YUMANIQ</div>' },
];

// Audio
let syn, pad, loop, curZ=null, on=false;

async function initAudio() {
  if(on) return; await Tone.start(); on=true;
  syn = new Tone.MonoSynth({
    oscillator:{type:"triangle"},
    envelope:{attack:0.02,decay:0.3,sustain:0.4,release:0.8},
    filterEnvelope:{attack:0.01,decay:0.2,sustain:0.3,release:0.5,baseFrequency:80,octaves:2.5},
  }).toDestination(); syn.volume.value=-14;
  pad = new Tone.PolySynth(Tone.Synth,{
    oscillator:{type:"sine"},
    envelope:{attack:2.5,decay:1,sustain:0.8,release:4},
  }).toDestination(); pad.volume.value=-30;
  document.getElementById("ai").classList.add("on");
}

function setZ(z) {
  if(!on||z===curZ) return; curZ=z;
  if(loop){loop.stop();loop.dispose();loop=null;}
  Tone.getTransport().stop(); Tone.getTransport().cancel();

  if(z==="gap") {
    syn.filterEnvelope.octaves=1.2; syn.envelope.release=0.15;
    Tone.getTransport().bpm.value=88;
    loop=new Tone.Loop(t=>{syn.triggerAttackRelease("E2","8n",t,0.45);},"4n");
    loop.start(0); Tone.getTransport().start();
  } else if(z==="unguarded") {
    if(pad) pad.triggerAttackRelease(["D3","A3","F#4"],10);
  } else if(z==="recognition") {
    syn.filterEnvelope.octaves=2.5; syn.envelope.release=0.6;
    Tone.getTransport().bpm.value=96;
    let s=0;
    const p=[
      {n:"D2",d:"8n",v:.8},{n:null},{n:"D3",d:"16n",v:.35},{n:"A2",d:"8n",v:.7},
      {n:"E2",d:"8n.",v:.6},{n:null},{n:"F#2",d:"8n",v:.6},{n:"G2",d:"4n",v:.75},
      {n:null},{n:"A2",d:"16n",v:.35},{n:"D2",d:"8n",v:.8},{n:"B1",d:"8n",v:.65},
      {n:"A1",d:"4n",v:.55},{n:null},{n:"D2",d:"16n",v:.3},{n:"E2",d:"8n",v:.7},
    ];
    loop=new Tone.Loop(t=>{const x=p[s%p.length];if(x.n)syn.triggerAttackRelease(x.n,x.d,t,x.v);s++;},"8n");
    loop.start(0); Tone.getTransport().start();
  }
}

// Build
const st=document.getElementById("story");
const zm={}; let cz="silence";
S.forEach((s,i)=>{if(s.z)cz=s.z;zm[i]=cz;});
S.forEach((s,i)=>{
  const d=document.createElement("div");
  d.className=`sec t-${s.t}`; d.innerHTML=s.h; d.dataset.i=i;
  st.appendChild(d);
});

const els=document.querySelectorAll(".sec");
const obs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add("vis");});
  if(!on)return;
  let mx=-1;
  els.forEach(el=>{if(el.classList.contains("vis")){const i=+el.dataset.i;if(i>mx)mx=i;}});
  if(mx>=0&&zm[mx])setZ(zm[mx]);
},{threshold:0.15,rootMargin:"0px 0px -8% 0px"});

async function go() {
  await initAudio();
  document.getElementById("entry").classList.add("hidden");
  st.classList.add("visible");
  setTimeout(()=>els.forEach(el=>obs.observe(el)),300);
}
</script>
</body>
</html>
